<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网址导航</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --card-hover: #222244;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --danger: #ff4757;
            --border: #2a2a45;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 200, 200, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(108, 99, 255, 0.03) 0%, transparent 80%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── 顶部 ── */
        .header {
            text-align: center;
            padding: 50px 20px 20px;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #00c8c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* ── 搜索栏 ── */
        .search-wrapper {
            width: 100%;
            max-width: 520px;
            margin: 10px auto 30px;
            padding: 0 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 12px 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.15);
        }
        .search-box svg {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            margin-right: 10px;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
        .search-box input::placeholder {
            color: #555;
        }

        /* ── 链接网格 ── */
        .container {
            width: 100%;
            max-width: 1000px;
            padding: 0 24px 60px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
        }

        /* ── 卡片 ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 14px 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .card:hover {
            background: var(--card-hover);
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(108, 99, 255, 0.2);
        }
        .card .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .card .name {
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.3;
            word-break: break-word;
            max-width: 100%;
        }

        /* 删除按钮 */
        .card .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .card:hover .delete-btn {
            opacity: 1;
        }
        .card .delete-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        /* 编辑按钮 */
        .card .edit-btn {
            position: absolute;
            top: 8px;
            right: 36px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent);
            cursor: pointer;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .card:hover .edit-btn {
            opacity: 1;
        }
        .card .edit-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        /* 添加按钮卡片 */
        .card.add-card {
            border-style: dashed;
            border-color: #3a3a5a;
            justify-content: center;
            min-height: 140px;
        }
        .card.add-card:hover {
            border-color: var(--accent);
        }
        .card.add-card .add-icon {
            font-size: 2.4rem;
            color: #555;
            transition: color 0.25s;
        }
        .card.add-card:hover .add-icon {
            color: var(--accent);
        }
        .card.add-card span {
            color: #666;
            font-size: 0.85rem;
            transition: color 0.25s;
        }
        .card.add-card:hover span {
            color: var(--accent);
        }

        /* ── 模态框 ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow);
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal .field {
            margin-bottom: 16px;
        }
        .modal label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .modal input {
            width: 100%;
            padding: 11px 14px;
            background: #12121f;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .modal input:focus {
            border-color: var(--accent);
        }
        .modal .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }
        .modal .btn {
            flex: 1;
            padding: 11px;
            border-radius: 10px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.35);
        }
        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border) !important;
        }
        .btn-cancel:hover {
            background: #1e1e35;
            color: var(--text);
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger) !important;
            font-size: 0.8rem;
            padding: 8px;
        }
        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #222244;
            color: #ccc;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: all 0.35s ease;
            z-index: 200;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── 空状态 ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }
        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        .empty-state p {
            font-size: 1rem;
        }

        /* ── 响应式 ── */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6rem; }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .card { padding: 16px 10px 14px; }
            .card .icon { width: 42px; height: 42px; font-size: 1.3rem; border-radius: 12px; }
            .card .name { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- ══════════ 头部 ══════════ -->
    <div class="header">
        <h1>🔖 我的网址导航</h1>
        <p class="subtitle">自定义收藏夹 · 一键直达常用网站</p>
    </div>

    <!-- ══════════ 搜索 ══════════ -->
    <div class="search-wrapper">
        <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索已保存的网站...">
        </div>
    </div>

    <!-- ══════════ 链接网格 ══════════ -->
    <div class="container">
        <div class="grid" id="linkGrid">
            <!-- JS 动态渲染 -->
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📭</div>
            <p>还没有收藏任何网站</p>
            <p style="font-size:0.85rem;margin-top:6px;">点击下方虚线卡片添加第一个吧！</p>
        </div>
    </div>

    <!-- ══════════ 模态框 ══════════ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">➕ 添加网站</h3>
            <div class="field">
                <label>网站名称</label>
                <input type="text" id="siteName" placeholder="例如：GitHub">
            </div>
            <div class="field">
                <label>网站地址</label>
                <input type="text" id="siteUrl" placeholder="例如：https://github.com">
            </div>
            <input type="hidden" id="editIndex" value="-1">
            <div class="btn-row">
                <button class="btn btn-cancel" id="btnCancel">取消</button>
                <button class="btn btn-primary" id="btnSave">保存</button>
            </div>
            <button class="btn btn-danger" id="btnDelete" style="display:none;width:100%;margin-top:10px;">🗑 删除此网站</button>
        </div>
    </div>

    <!-- ══════════ Toast ══════════ -->
    <div class="toast" id="toast"></div>

    <script>
        // ──────────────── 数据管理 ────────────────
        const STORAGE_KEY = 'my_navigation_sites';

        function loadSites() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        }

        function saveSites(sites) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
        }

        // 初始化默认数据（仅在首次使用时）
        function initDefaultSites() {
            const sites = loadSites();
            if (sites.length === 0) {
                const defaults = [
                    { name: 'GitHub', url: 'https://github.com' },
                    { name: 'Google', url: 'https://www.google.com' },
                    { name: 'Bilibili', url: 'https://www.bilibili.com' },
                    { name: '百度', url: 'https://www.baidu.com' },
                    { name: '知乎', url: 'https://www.zhihu.com' },
                    { name: 'Stack Overflow', url: 'https://stackoverflow.com' },
                ];
                saveSites(defaults);
                return defaults;
            }
            return sites;
        }

        // ──────────────── 颜色生成 ────────────────
        const COLORS = [
            '#6c63ff', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff',
            '#ff922b', '#20c997', '#f06595', '#845ef7', '#339af0',
            '#fcc419', '#51cf66', '#ff6b6b', '#cc5de8', '#22b8cf',
        ];

        function getColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return COLORS[Math.abs(hash) % COLORS.length];
        }

        function getInitial(name) {
            // 优先取中文首字或英文首字母
            const t = name.trim();
            if (!t) return '?';
            // 中文
            if (/[\u4e00-\u9fff]/.test(t[0])) return t[0];
            // 英文取首字母大写
            return t[0].toUpperCase();
        }

        // ──────────────── 渲染 ────────────────
        function render(sites) {
            const grid = document.getElementById('linkGrid');
            const empty = document.getElementById('emptyState');

            if (sites.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
            }

            // 先渲染所有卡片
            grid.innerHTML = sites.map((site, index) => `
                <a class="card" href="${escapeHtml(site.url)}" target="_blank" rel="noopener"
                   data-index="${index}" data-name="${escapeHtml(site.name).toLowerCase()}"
                   title="${escapeHtml(site.name)}\n${escapeHtml(site.url)}">
                    <button class="edit-btn" title="编辑" onclick="editSite(event, ${index})">✎</button>
                    <button class="delete-btn" title="删除" onclick="deleteSite(event, ${index})">✕</button>
                    <div class="icon" style="background:${getColor(site.name)}">${getInitial(site.name)}</div>
                    <span class="name">${escapeHtml(site.name)}</span>
                </a>
            `).join('');

            // 添加按钮
            grid.insertAdjacentHTML('beforeend', `
                <div class="card add-card" onclick="openAddModal()">
                    <div class="add-icon">＋</div>
                    <span>添加网站</span>
                </div>
            `);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ──────────────── 搜索过滤 ────────────────
        let allSites = [];

        function filterSites(query) {
            if (!query.trim()) {
                render(allSites);
                return;
            }
            const q = query.toLowerCase();
            const filtered = allSites.filter(s =>
                s.name.toLowerCase().includes(q) ||
                s.url.toLowerCase().includes(q)
            );
            render(filtered);
        }

        // ──────────────── 模态框 ────────────────
        const overlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const inputName = document.getElementById('siteName');
        const inputUrl = document.getElementById('siteUrl');
        const editIndexInput = document.getElementById('editIndex');
        const btnDelete = document.getElementById('btnDelete');

        function openAddModal() {
            modalTitle.textContent = '➕ 添加网站';
            inputName.value = '';
            inputUrl.value = '';
            editIndexInput.value = '-1';
            btnDelete.style.display = 'none';
            overlay.classList.add('active');
            inputName.focus();
        }

        function openEditModal(index) {
            const site = allSites[index];
            modalTitle.textContent = '✎ 编辑网站';
            inputName.value = site.name;
            inputUrl.value = site.url;
            editIndexInput.value = index;
            btnDelete.style.display = 'block';
            overlay.classList.add('active');
            inputName.focus();
        }

        function closeModal() {
            overlay.classList.remove('active');
        }

        function saveSite() {
            const name = inputName.value.trim();
            let url = inputUrl.value.trim();
            const index = parseInt(editIndexInput.value);

            if (!name) { showToast('⚠️ 请输入网站名称'); return; }
            if (!url) { showToast('⚠️ 请输入网站地址'); return; }

            // 自动补全 https://
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            // 简单校验
            try { new URL(url); } catch {
                showToast('⚠️ 网址格式不正确'); return;
            }

            if (index >= 0 && index < allSites.length) {
                allSites[index] = { name, url };
                showToast('✅ 网站已更新');
            } else {
                allSites.push({ name, url });
                showToast('✅ 网站已添加');
            }

            saveSites(allSites);
            render(allSites);
            closeModal();
        }

        function deleteSiteFromModal() {
            const index = parseInt(editIndexInput.value);
            if (index >= 0 && index < allSites.length) {
                allSites.splice(index, 1);
                saveSites(allSites);
                render(allSites);
                showToast('🗑 网站已删除');
                closeModal();
            }
        }

        // ──────────────── 卡片操作 ────────────────
        function editSite(e, index) {
            e.preventDefault();
            e.stopPropagation();
            openEditModal(index);
        }

        function deleteSite(e, index) {
            e.preventDefault();
            e.stopPropagation();
            if (confirm(`确定要删除「${allSites[index].name}」吗？`)) {
                allSites.splice(index, 1);
                saveSites(allSites);
                render(allSites);
                showToast('🗑 网站已删除');
            }
        }

        // ──────────────── Toast ────────────────
        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ──────────────── 事件绑定 ────────────────
        document.getElementById('btnSave').addEventListener('click', saveSite);
        document.getElementById('btnCancel').addEventListener('click', closeModal);
        document.getElementById('btnDelete').addEventListener('click', deleteSiteFromModal);

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && overlay.classList.contains('active')) saveSite();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterSites(e.target.value);
        });

        // ──────────────── 启动 ────────────────
        allSites = initDefaultSites();
        render(allSites);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网址导航</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --card-hover: #222244;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --danger: #ff4757;
            --border: #2a2a45;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 200, 200, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(108, 99, 255, 0.03) 0%, transparent 80%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── 顶部 ── */
        .header {
            text-align: center;
            padding: 50px 20px 20px;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #00c8c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* ── 搜索栏 ── */
        .search-wrapper {
            width: 100%;
            max-width: 520px;
            margin: 10px auto 30px;
            padding: 0 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 12px 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.15);
        }
        .search-box svg {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            margin-right: 10px;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
        .search-box input::placeholder {
            color: #555;
        }

        /* ── 工具栏 ── */
        .toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }
        .tool-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .tool-btn:hover {
            border-color: var(--accent);
            color: var(--text);
            background: var(--card-hover);
        }
        .tool-btn.export-btn:hover {
            border-color: #20c997;
        }
        .tool-btn.import-btn:hover {
            border-color: #ff922b;
        }
        .tool-btn.bg-btn:hover {
            border-color: #f06595;
        }

        /* ── 背景预设 ── */
        .bg-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0;
            justify-content: center;
        }
        .bg-preset {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .bg-preset:hover {
            transform: scale(1.1);
        }
        .bg-preset.active {
            border-color: #fff;
            box-shadow: 0 0 0 2px var(--accent);
        }
        .bg-preset.active::after {
            content: '✓';
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--accent);
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-field-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }
        .bg-field-row input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            padding: 0;
            background: transparent;
        }
        .bg-field-row input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .bg-field-row input[type="color"]::-webkit-color-swatch {
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .bg-field-row input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            background: #12121f;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .bg-field-row input[type="text"]:focus {
            border-color: var(--accent);
        }
        .bg-section-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin: 14px 0 8px;
            letter-spacing: 0.5px;
            text-align: left;
        }

        /* ── 链接网格 ── */
        .container {
            width: 100%;
            max-width: 1000px;
            padding: 0 24px 60px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
        }

        /* ── 卡片 ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 14px 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .card:hover {
            background: var(--card-hover);
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(108, 99, 255, 0.2);
        }
        .card .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .card .name {
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.3;
            word-break: break-word;
            max-width: 100%;
        }

        /* 删除按钮 */
        .card .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .card:hover .delete-btn {
            opacity: 1;
        }
        .card .delete-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        /* 编辑按钮 */
        .card .edit-btn {
            position: absolute;
            top: 8px;
            right: 36px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent);
            cursor: pointer;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .card:hover .edit-btn {
            opacity: 1;
        }
        .card .edit-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        /* 添加按钮卡片 */
        .card.add-card {
            border-style: dashed;
            border-color: #3a3a5a;
            justify-content: center;
            min-height: 140px;
        }
        .card.add-card:hover {
            border-color: var(--accent);
        }
        .card.add-card .add-icon {
            font-size: 2.4rem;
            color: #555;
            transition: color 0.25s;
        }
        .card.add-card:hover .add-icon {
            color: var(--accent);
        }
        .card.add-card span {
            color: #666;
            font-size: 0.85rem;
            transition: color 0.25s;
        }
        .card.add-card:hover span {
            color: var(--accent);
        }

        /* ── 模态框 ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow);
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal .field {
            margin-bottom: 16px;
        }
        .modal label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .modal input {
            width: 100%;
            padding: 11px 14px;
            background: #12121f;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .modal input:focus {
            border-color: var(--accent);
        }
        .modal .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }
        .modal .btn {
            flex: 1;
            padding: 11px;
            border-radius: 10px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.35);
        }
        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border) !important;
        }
        .btn-cancel:hover {
            background: #1e1e35;
            color: var(--text);
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger) !important;
            font-size: 0.8rem;
            padding: 8px;
        }
        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #222244;
            color: #ccc;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: all 0.35s ease;
            z-index: 200;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── 密码锁 ── */
        .lock-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 200, 200, 0.08) 0%, transparent 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s, visibility 0.4s;
        }
        .lock-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .lock-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 32px 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .lock-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .lock-box h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
            color: var(--text);
        }
        .lock-box .lock-hint {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        .lock-box input {
            width: 100%;
            padding: 12px 16px;
            background: #12121f;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
            transition: border-color 0.3s;
        }
        .lock-box input:focus {
            border-color: var(--accent);
        }
        .lock-box .lock-btn {
            width: 100%;
            margin-top: 14px;
            padding: 11px;
            border-radius: 10px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .lock-box .lock-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.35);
        }
        .lock-box .lock-error {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 10px;
            min-height: 20px;
            transition: opacity 0.3s;
        }

        /* ── 空状态 ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }
        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        .empty-state p {
            font-size: 1rem;
        }

        /* ── 响应式 ── */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6rem; }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .card { padding: 16px 10px 14px; }
            .card .icon { width: 42px; height: 42px; font-size: 1.3rem; border-radius: 12px; }
            .card .name { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- ══════════ 头部 ══════════ -->
    <div class="header">
        <h1>🔖 我的网址导航</h1>
        <p class="subtitle">自定义收藏夹 · 一键直达常用网站</p>
    </div>

    <!-- ══════════ 搜索 ══════════ -->
    <div class="search-wrapper">
        <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索已保存的网站...">
        </div>
        <div class="toolbar">
            <button class="tool-btn export-btn" id="btnExport" title="导出收藏为文件">📥 导出</button>
            <button class="tool-btn import-btn" id="btnImport" title="从文件导入收藏">📤 导入</button>
            <button class="tool-btn bg-btn" id="btnBg" title="自定义背景">🎨 背景</button>
        </div>
    </div>

    <!-- ══════════ 链接网格 ══════════ -->
    <div class="container">
        <div class="grid" id="linkGrid">
            <!-- JS 动态渲染 -->
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📭</div>
            <p>还没有收藏任何网站</p>
            <p style="font-size:0.85rem;margin-top:6px;">点击下方虚线卡片添加第一个吧！</p>
        </div>
    </div>

    <!-- ══════════ 模态框 ══════════ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">➕ 添加网站</h3>
            <div class="field">
                <label>网站名称</label>
                <input type="text" id="siteName" placeholder="例如：GitHub">
            </div>
            <div class="field">
                <label>网站地址</label>
                <input type="text" id="siteUrl" placeholder="例如：https://github.com">
            </div>
            <input type="hidden" id="editIndex" value="-1">
            <div class="btn-row">
                <button class="btn btn-cancel" id="btnCancel">取消</button>
                <button class="btn btn-primary" id="btnSave">保存</button>
            </div>
            <button class="btn btn-danger" id="btnDelete" style="display:none;width:100%;margin-top:10px;">🗑 删除此网站</button>
        </div>
    </div>

    <!-- ══════════ Toast ══════════ -->
    <div class="toast" id="toast"></div>

    <!-- ══════════ 背景设置弹窗 ══════════ -->
    <div class="modal-overlay" id="bgOverlay">
        <div class="modal">
            <h3>🎨 自定义背景</h3>
            <p class="bg-section-label">📐 预设主题</p>
            <div class="bg-presets" id="bgPresets">
                <!-- JS 动态渲染 -->
            </div>
            <p class="bg-section-label">🎨 自定义纯色</p>
            <div class="bg-field-row">
                <input type="color" id="bgColorPicker" value="#0f0f1a">
                <input type="text" id="bgColorText" placeholder="#0f0f1a" maxlength="7">
            </div>
            <p class="bg-section-label">🖼 图片背景（输入图片 URL）</p>
            <div class="bg-field-row">
                <input type="text" id="bgImageUrl" placeholder="https://example.com/bg.jpg">
            </div>
            <div class="btn-row">
                <button class="btn btn-cancel" id="btnBgCancel">取消</button>
                <button class="btn btn-primary" id="btnBgApply">✅ 应用</button>
            </div>
            <button class="btn btn-danger" id="btnBgReset" style="width:100%;margin-top:10px;">🔄 恢复默认背景</button>
        </div>
    </div>

    <!-- ══════════ 密码锁 ══════════ -->
    <div class="lock-overlay" id="lockOverlay">
        <div class="lock-box">
            <div class="lock-icon">🔐</div>
            <h3 id="lockTitle">设置访问密码</h3>
            <p class="lock-hint" id="lockHint">首次使用，请设置一个密码</p>
            <input type="password" id="lockPassword" placeholder="请输入密码" maxlength="32" autocomplete="off">
            <button class="lock-btn" id="lockBtn">🔓 解锁</button>
            <div class="lock-error" id="lockError"></div>
        </div>
    </div>

    <script>
        // ──────────────── 背景自定义 ────────────────
        (function() {
            const BG_KEY = 'nav_bg_config';
            const DEFAULT_BG = {
                type: 'default',
                value: ''
            };

            // 预设背景
            const PRESETS = [
                { name: '默认星空', type: 'default', value: '', css: '' },
                { name: '深邃蓝', type: 'solid', value: '#0a0a1a', css: '#0a0a1a' },
                { name: '暗夜紫', type: 'solid', value: '#0f0a1a', css: '#0f0a1a' },
                { name: '墨绿', type: 'solid', value: '#0a1a14', css: '#0a1a14' },
                { name: '深棕', type: 'solid', value: '#1a1410', css: '#1a1410' },
                { name: '暗红', type: 'solid', value: '#1a0f0f', css: '#1a0f0f' },
                { name: '渐变紫蓝', type: 'gradient', value: 'linear-gradient(135deg, #1a0a2e, #0a1628)', css: 'linear-gradient(135deg, #1a0a2e, #0a1628)' },
                { name: '渐变日落', type: 'gradient', value: 'linear-gradient(135deg, #2d1b00, #1a0a2e)', css: 'linear-gradient(135deg, #2d1b00, #1a0a2e)' },
                { name: '渐变海洋', type: 'gradient', value: 'linear-gradient(135deg, #0a1628, #0a2e2e)', css: 'linear-gradient(135deg, #0a1628, #0a2e2e)' },
            ];

            const bgOverlay = document.getElementById('bgOverlay');
            const bgPresetsDiv = document.getElementById('bgPresets');
            const bgColorPicker = document.getElementById('bgColorPicker');
            const bgColorText = document.getElementById('bgColorText');
            const bgImageUrl = document.getElementById('bgImageUrl');

            let currentConfig = loadBgConfig();
            let tempConfig = { ...currentConfig };

            function loadBgConfig() {
                try {
                    const raw = localStorage.getItem(BG_KEY);
                    return raw ? JSON.parse(raw) : { ...DEFAULT_BG };
                } catch { return { ...DEFAULT_BG }; }
            }

            function saveBgConfig(config) {
                localStorage.setItem(BG_KEY, JSON.stringify(config));
            }

            function applyBackground(config) {
                const body = document.body;
                // 清除之前的背景
                body.style.background = '';
                body.style.backgroundImage = '';
                body.style.backgroundColor = '';

                if (config.type === 'default') {
                    body.style.background = 'var(--bg)';
                    body.style.backgroundImage = 'radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(0, 200, 200, 0.06) 0%, transparent 60%), radial-gradient(ellipse at 50% 50%, rgba(108, 99, 255, 0.03) 0%, transparent 80%)';
                } else if (config.type === 'solid') {
                    body.style.background = config.value;
                    body.style.backgroundImage = 'none';
                } else if (config.type === 'gradient') {
                    body.style.background = config.value;
                    body.style.backgroundImage = 'none';
                } else if (config.type === 'image') {
                    body.style.background = 'var(--bg)';
                    body.style.backgroundImage = `url(${config.value})`;
                    body.style.backgroundSize = 'cover';
                    body.style.backgroundPosition = 'center';
                    body.style.backgroundAttachment = 'fixed';
                }
            }

            // 渲染预设色块
            function renderPresets(activeConfig) {
                bgPresetsDiv.innerHTML = PRESETS.map((p, i) => {
                    let bgStyle = '';
                    if (p.type === 'default') {
                        bgStyle = 'background: #0f0f1a; background-image: radial-gradient(ellipse at 30% 30%, rgba(108,99,255,0.5) 0%, transparent 70%);';
                    } else if (p.type === 'solid') {
                        bgStyle = `background: ${p.css};`;
                    } else if (p.type === 'gradient') {
                        bgStyle = `background: ${p.css};`;
                    }
                    const isActive = (activeConfig.type === p.type && activeConfig.value === p.value);
                    return `<div class="bg-preset${isActive ? ' active' : ''}" style="${bgStyle}" title="${p.name}" data-index="${i}"></div>`;
                }).join('');
            }

            function openBgModal() {
                tempConfig = { ...currentConfig };
                renderPresets(tempConfig);
                bgColorPicker.value = tempConfig.type === 'solid' ? tempConfig.value : '#0f0f1a';
                bgColorText.value = tempConfig.type === 'solid' ? tempConfig.value : '';
                bgImageUrl.value = tempConfig.type === 'image' ? tempConfig.value : '';
                bgOverlay.classList.add('active');
            }

            function closeBgModal() {
                bgOverlay.classList.remove('active');
            }

            // 预设点击
            bgPresetsDiv.addEventListener('click', (e) => {
                const preset = e.target.closest('.bg-preset');
                if (!preset) return;
                const index = parseInt(preset.dataset.index);
                const p = PRESETS[index];
                tempConfig = { type: p.type, value: p.value };
                renderPresets(tempConfig);
                if (p.type === 'solid') {
                    bgColorPicker.value = p.value;
                    bgColorText.value = p.value;
                }
                bgImageUrl.value = '';
            });

            // 颜色选择器同步
            bgColorPicker.addEventListener('input', () => {
                bgColorText.value = bgColorPicker.value;
                tempConfig = { type: 'solid', value: bgColorPicker.value };
                renderPresets(tempConfig);
                bgImageUrl.value = '';
            });

            bgColorText.addEventListener('input', () => {
                let val = bgColorText.value.trim();
                if (/^#[0-9a-fA-F]{6}$/.test(val)) {
                    bgColorPicker.value = val;
                    tempConfig = { type: 'solid', value: val };
                    renderPresets(tempConfig);
                    bgImageUrl.value = '';
                }
            });

            // 图片 URL
            bgImageUrl.addEventListener('input', () => {
                const val = bgImageUrl.value.trim();
                if (val) {
                    tempConfig = { type: 'image', value: val };
                    renderPresets({ type: 'image', value: val });
                }
            });

            // 应用
            document.getElementById('btnBgApply').addEventListener('click', () => {
                currentConfig = { ...tempConfig };
                saveBgConfig(currentConfig);
                applyBackground(currentConfig);
                closeBgModal();
                showToast('✅ 背景已更新');
            });

            // 取消
            document.getElementById('btnBgCancel').addEventListener('click', closeBgModal);

            // 重置
            document.getElementById('btnBgReset').addEventListener('click', () => {
                tempConfig = { ...DEFAULT_BG };
                currentConfig = { ...DEFAULT_BG };
                saveBgConfig(currentConfig);
                applyBackground(currentConfig);
                renderPresets(tempConfig);
                bgColorPicker.value = '#0f0f1a';
                bgColorText.value = '';
                bgImageUrl.value = '';
                closeBgModal();
                showToast('🔄 已恢复默认背景');
            });

            // 弹窗外点击关闭
            bgOverlay.addEventListener('click', (e) => {
                if (e.target === bgOverlay) closeBgModal();
            });

            // 启动
            applyBackground(currentConfig);

            // 暴露打开函数
            window._openBgModal = openBgModal;
        })();

        // ──────────────── 密码锁 ────────────────
        (function() {
            const LOCK_HASH_KEY = 'nav_lock_hash';
            const lockOverlay = document.getElementById('lockOverlay');
            const lockTitle = document.getElementById('lockTitle');
            const lockHint = document.getElementById('lockHint');
            const lockPassword = document.getElementById('lockPassword');
            const lockBtn = document.getElementById('lockBtn');
            const lockError = document.getElementById('lockError');

            // 简单哈希（SHA-256 异步版用 crypto.subtle，这里用简单方案保证兼容性）
            async function hashPassword(pwd) {
                const encoder = new TextEncoder();
                const data = encoder.encode(pwd + 'nav_salt_2026');
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            const savedHash = localStorage.getItem(LOCK_HASH_KEY);
            const isFirstTime = !savedHash;

            if (isFirstTime) {
                lockTitle.textContent = '🔐 设置访问密码';
                lockHint.textContent = '首次使用，请设置一个密码（至少4位）';
                lockBtn.textContent = '🔒 设置密码';
                lockPassword.placeholder = '设置密码（至少4位）';
            } else {
                lockTitle.textContent = '🔐 请输入密码';
                lockHint.textContent = '此页面已加密，请输入密码解锁';
                lockBtn.textContent = '🔓 解锁';
                lockPassword.placeholder = '请输入密码';
            }

            lockPassword.focus();

            async function handleUnlock() {
                const pwd = lockPassword.value;
                lockError.textContent = '';

                if (!pwd) {
                    lockError.textContent = '⚠️ 请输入密码';
                    return;
                }

                if (isFirstTime) {
                    if (pwd.length < 4) {
                        lockError.textContent = '⚠️ 密码至少需要4位';
                        return;
                    }
                    const hash = await hashPassword(pwd);
                    localStorage.setItem(LOCK_HASH_KEY, hash);
                    lockOverlay.classList.add('hidden');
                    showToast('✅ 密码已设置，下次访问需输入密码');
                } else {
                    const hash = await hashPassword(pwd);
                    if (hash === savedHash) {
                        lockOverlay.classList.add('hidden');
                    } else {
                        lockError.textContent = '❌ 密码错误，请重试';
                        lockPassword.value = '';
                        lockPassword.focus();
                    }
                }
            }

            lockBtn.addEventListener('click', handleUnlock);
            lockPassword.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleUnlock();
            });
        })();

        // ──────────────── 数据管理 ────────────────
        const STORAGE_KEY = 'my_navigation_sites';

        function loadSites() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        }

        function saveSites(sites) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
        }

        // 导出收藏为 JSON 文件
        function exportSites() {
            const sites = allSites;
            if (sites.length === 0) {
                showToast('⚠️ 没有可导出的收藏');
                return;
            }
            const data = JSON.stringify(sites, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            a.download = `我的网址导航_备份_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`📥 已导出 ${sites.length} 个收藏`);
        }

        // 导入收藏（替换模式）
        function importSites(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) {
                        showToast('⚠️ 文件格式不正确');
                        return;
                    }
                    // 验证每条数据
                    const valid = imported.filter(s => s && typeof s.name === 'string' && typeof s.url === 'string');
                    if (valid.length === 0) {
                        showToast('⚠️ 文件中没有有效数据');
                        return;
                    }
                    allSites = valid;
                    saveSites(allSites);
                    render(allSites);
                    showToast(`📤 已导入 ${valid.length} 个收藏`);
                } catch {
                    showToast('⚠️ 文件解析失败，请检查格式');
                }
            };
            reader.readAsText(file);
        }

        // 初始化默认数据（仅在首次使用时）
        function initDefaultSites() {
            const sites = loadSites();
            if (sites.length === 0) {
                const defaults = [
                    { name: 'GitHub', url: 'https://github.com' },
                    { name: 'Google', url: 'https://www.google.com' },
                    { name: 'Bilibili', url: 'https://www.bilibili.com' },
                    { name: '百度', url: 'https://www.baidu.com' },
                    { name: '知乎', url: 'https://www.zhihu.com' },
                    { name: 'Stack Overflow', url: 'https://stackoverflow.com' },
                ];
                saveSites(defaults);
                return defaults;
            }
            return sites;
        }

        // ──────────────── 颜色生成 ────────────────
        const COLORS = [
            '#6c63ff', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff',
            '#ff922b', '#20c997', '#f06595', '#845ef7', '#339af0',
            '#fcc419', '#51cf66', '#ff6b6b', '#cc5de8', '#22b8cf',
        ];

        function getColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return COLORS[Math.abs(hash) % COLORS.length];
        }

        function getInitial(name) {
            // 优先取中文首字或英文首字母
            const t = name.trim();
            if (!t) return '?';
            // 中文
            if (/[\u4e00-\u9fff]/.test(t[0])) return t[0];
            // 英文取首字母大写
            return t[0].toUpperCase();
        }

        // ──────────────── 渲染 ────────────────
        function render(sites) {
            const grid = document.getElementById('linkGrid');
            const empty = document.getElementById('emptyState');

            if (sites.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
            }

            // 先渲染所有卡片
            grid.innerHTML = sites.map((site, index) => `
                <a class="card" href="${escapeHtml(site.url)}" target="_blank" rel="noopener"
                   data-index="${index}" data-name="${escapeHtml(site.name).toLowerCase()}"
                   title="${escapeHtml(site.name)}\n${escapeHtml(site.url)}">
                    <button class="edit-btn" title="编辑" onclick="editSite(event, ${index})">✎</button>
                    <button class="delete-btn" title="删除" onclick="deleteSite(event, ${index})">✕</button>
                    <div class="icon" style="background:${getColor(site.name)}">${getInitial(site.name)}</div>
                    <span class="name">${escapeHtml(site.name)}</span>
                </a>
            `).join('');

            // 添加按钮
            grid.insertAdjacentHTML('beforeend', `
                <div class="card add-card" onclick="openAddModal()">
                    <div class="add-icon">＋</div>
                    <span>添加网站</span>
                </div>
            `);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ──────────────── 搜索过滤 ────────────────
        let allSites = [];

        function filterSites(query) {
            if (!query.trim()) {
                render(allSites);
                return;
            }
            const q = query.toLowerCase();
            const filtered = allSites.filter(s =>
                s.name.toLowerCase().includes(q) ||
                s.url.toLowerCase().includes(q)
            );
            render(filtered);
        }

        // ──────────────── 模态框 ────────────────
        const overlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const inputName = document.getElementById('siteName');
        const inputUrl = document.getElementById('siteUrl');
        const editIndexInput = document.getElementById('editIndex');
        const btnDelete = document.getElementById('btnDelete');

        function openAddModal() {
            modalTitle.textContent = '➕ 添加网站';
            inputName.value = '';
            inputUrl.value = '';
            editIndexInput.value = '-1';
            btnDelete.style.display = 'none';
            overlay.classList.add('active');
            inputName.focus();
        }

        function openEditModal(index) {
            const site = allSites[index];
            modalTitle.textContent = '✎ 编辑网站';
            inputName.value = site.name;
            inputUrl.value = site.url;
            editIndexInput.value = index;
            btnDelete.style.display = 'block';
            overlay.classList.add('active');
            inputName.focus();
        }

        function closeModal() {
            overlay.classList.remove('active');
        }

        function saveSite() {
            const name = inputName.value.trim();
            let url = inputUrl.value.trim();
            const index = parseInt(editIndexInput.value);

            if (!name) { showToast('⚠️ 请输入网站名称'); return; }
            if (!url) { showToast('⚠️ 请输入网站地址'); return; }

            // 自动补全 https://
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            // 简单校验
            try { new URL(url); } catch {
                showToast('⚠️ 网址格式不正确'); return;
            }

            if (index >= 0 && index < allSites.length) {
                allSites[index] = { name, url };
                showToast('✅ 网站已更新');
            } else {
                allSites.push({ name, url });
                showToast('✅ 网站已添加');
            }

            saveSites(allSites);
            render(allSites);
            closeModal();
        }

        function deleteSiteFromModal() {
            const index = parseInt(editIndexInput.value);
            if (index >= 0 && index < allSites.length) {
                allSites.splice(index, 1);
                saveSites(allSites);
                render(allSites);
                showToast('🗑 网站已删除');
                closeModal();
            }
        }

        // ──────────────── 卡片操作 ────────────────
        function editSite(e, index) {
            e.preventDefault();
            e.stopPropagation();
            openEditModal(index);
        }

        function deleteSite(e, index) {
            e.preventDefault();
            e.stopPropagation();
            if (confirm(`确定要删除「${allSites[index].name}」吗？`)) {
                allSites.splice(index, 1);
                saveSites(allSites);
                render(allSites);
                showToast('🗑 网站已删除');
            }
        }

        // ──────────────── Toast ────────────────
        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ──────────────── 事件绑定 ────────────────
        document.getElementById('btnSave').addEventListener('click', saveSite);
        document.getElementById('btnCancel').addEventListener('click', closeModal);
        document.getElementById('btnDelete').addEventListener('click', deleteSiteFromModal);

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('bgOverlay').classList.contains('active')) {
                    document.getElementById('bgOverlay').classList.remove('active');
                    return;
                }
                closeModal();
            }
            if (e.key === 'Enter' && overlay.classList.contains('active')) saveSite();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterSites(e.target.value);
        });

        // 导出导入
        document.getElementById('btnExport').addEventListener('click', exportSites);
        document.getElementById('btnImport').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                if (e.target.files.length > 0) {
                    importSites(e.target.files[0]);
                }
            };
            input.click();
        });

        // 背景设置
        document.getElementById('btnBg').addEventListener('click', () => {
            window._openBgModal();
        });

        // ──────────────── 启动 ────────────────
        allSites = initDefaultSites();
        render(allSites);
    </script>
</body>
</html>

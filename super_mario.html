<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Bros HTML5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    color: #fff;
    user-select: none;
  }
  h1 { margin-bottom: 8px; font-size: 20px; color: #ffcc00; text-shadow: 2px 2px #c00; }
  canvas { image-rendering: pixelated; border: 4px solid #444; background: #5c94fc; }
  .ui {
    margin-top: 8px;
    font-size: 14px;
    display: flex;
    gap: 24px;
  }
  .key { color: #ffcc00; }
  #msg {
    margin-top: 6px;
    font-size: 16px;
    height: 22px;
    color: #0f0;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>⭐ Super Mario Bros (HTML5) ⭐</h1>
<canvas id="game" width="960" height="544"></canvas>
<div class="ui">
  <span>控制: <span class="key">← → / A D</span> 移动</span>
  <span><span class="key">↑ / W / 空格</span> 跳跃</span>
  <span><span class="key">R</span> 重玩</span>
</div>
<div id="msg"></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const TILE = 32;
const GRAVITY = 0.5;
const JUMP = -10.5;
const SPEED = 4.5;
const FRICTION = 0.82;
const MAX_LIVES = 3;

let keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// 音效合成器
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();
function beep(freq, duration, type='square', vol=0.08) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxJump() { beep(300, 0.1, 'square', 0.08); beep(450, 0.15, 'square', 0.08); }
function sfxCoin() { beep(900, 0.08, 'sine', 0.1); setTimeout(()=>beep(1200, 0.15, 'sine', 0.1), 80); }
function sfxBump() { beep(150, 0.1, 'square', 0.1); }
function sfxStomp() { beep(180, 0.08, 'square', 0.1); }
function sfxDie() {
  beep(400, 0.15, 'square', 0.1); beep(350, 0.15, 'square', 0.1);
  beep(300, 0.15, 'square', 0.1); beep(200, 0.4, 'square', 0.1);
}
function sfxWin() {
  [523,659,783,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'square',0.08),i*120));
}

// 关卡数据 (每个字符 = 1格)
// #=砖块 ?=问号块 P=水管上 p=水管下 |=旗杆 -=地面 .为空
// M=马里奥起点 E=蘑菇怪 K=坑(不画地面) C=金币
const rawLevel = [
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"................................................................................................................................................",
"..........................................................................................???...................................................",
".........................................................................................#####..................................................",
"..........................................................................???...................................................................",
".........................................................................#####...................................................................",
"...........................................................................................................................Ppp..................",
"...........................................???.............................................................................Ppp..................",
"..........................................#####.................................................E..........................Ppp..................",
"...............................................................................................###.........................Ppp..................",
"...........................................................................................................................Ppp.........|........",
"...........................................................................................................................Ppp.........|........",
"..............................................E.................................E..........................................Ppp.........|........",
".............???.............................###...........??...................###.................................??.....####........|........",
"............#####.........................................####.................####................................#####...............|........",
".......................................................................................................................................|........",
".......................................................................................................................................|........",
"...M...................................................................................................................................|........",
"...---...---.........---...---.........---...---.........---...---...K...---...---.........---...---.........---...---...---...---...---...---...",
"...---...---.........---...---.........---...---.........---...---...K...---...---.........---...---.........---...---...---...---...---...---...",
"...---...---.........---...---.........---...---.........---...---...K...---...---.........---...---.........---...---...---...---...---...---...",
];

let mapW, mapH;
let tiles = [];
let enemies = [];
let coins = [];
let particles = [];
let cameraX = 0;
let cameraY = 0;
let lives = MAX_LIVES;
let score = 0;
let won = false;
let dead = false;
let deadTimer = 0;
let time = 400;
let timeTick = 0;
let flagX = -1, flagY = -1;

let mario = { x: 0, y: 0, vx: 0, vy: 0, w: 26, h: 30, onGround: false, dir: 1 };
let startPos = { x: 0, y: 0 };

function initLevel() {
  tiles = [];
  enemies = [];
  coins = [];
  particles = [];
  mapH = rawLevel.length;
  mapW = rawLevel[0].length;
  for (let y = 0; y < mapH; y++) {
    let row = [];
    for (let x = 0; x < mapW; x++) {
      let c = rawLevel[y][x] || '.';
      if (c === 'M') {
        mario.x = x * TILE + 3; mario.y = y * TILE; startPos = { x: mario.x, y: mario.y };
        row.push('.');
      } else if (c === 'E') {
        enemies.push({ x: x * TILE, y: y * TILE + 2, w: 28, h: 28, vx: -1.2, alive: true, anim: 0 });
        row.push('.');
      } else if (c === 'C') {
        coins.push({ x: x * TILE + 8, y: y * TILE + 8, r: 8, alive: true, pop: 0 });
        row.push('.');
      } else {
        row.push(c);
      }
      if (c === '|') { flagX = x * TILE; flagY = y * TILE; }
    }
    tiles.push(row);
  }
  mario.vx = 0; mario.vy = 0; mario.onGround = false; mario.dir = 1;
  cameraX = 0; cameraY = 0; won = false; dead = false; deadTimer = 0; time = 400; timeTick = 0;
  if (lives <= 0) { lives = MAX_LIVES; score = 0; }
}

function solid(c) { return c === '#' || c === '?' || c === 'P' || c === 'p' || c === '-'; }
function isTileSolid(tx, ty) {
  if (tx < 0 || tx >= mapW || ty < 0 || ty >= mapH) return false;
  return solid(tiles[ty][tx]);
}

function rectRect(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}
  
function resolveEntity(ent) {
  ent.onGround = false;
  // 水平
  if (ent.vx !== 0) {
    let nextX = ent.x + ent.vx;
    let left = Math.floor(nextX / TILE);
    let right = Math.floor((nextX + ent.w - 1) / TILE);
    let top = Math.floor(ent.y / TILE);
    let bottom = Math.floor((ent.y + ent.h - 1) / TILE);
    let hit = false;
    if (ent.vx > 0) {
      for (let ty = top; ty <= bottom; ty++) if (isTileSolid(right, ty)) { hit = true; break; }
      if (hit) ent.x = right * TILE - ent.w;
      else ent.x = nextX;
    } else {
      for (let ty = top; ty <= bottom; ty++) if (isTileSolid(left, ty)) { hit = true; break; }
      if (hit) ent.x = (left + 1) * TILE;
      else ent.x = nextX;
    }
  }
  // 垂直
  if (ent.vy !== 0) {
    let nextY = ent.y + ent.vy;
    let left = Math.floor(ent.x / TILE);
    let right = Math.floor((ent.x + ent.w - 1) / TILE);
    let top = Math.floor(nextY / TILE);
    let bottom = Math.floor((nextY + ent.h - 1) / TILE);
    if (ent.vy > 0) {
      let hit = false;
      for (let tx = left; tx <= right; tx++) if (isTileSolid(tx, bottom)) { hit = true; break; }
      if (hit) {
        ent.y = bottom * TILE - ent.h;
        ent.vy = 0;
        ent.onGround = true;
      } else ent.y = nextY;
    } else {
      let hit = false;
      for (let tx = left; tx <= right; tx++) if (isTileSolid(tx, top)) { hit = true; break; }
      if (hit) {
        // 顶砖块效果
        for (let tx = left; tx <= right; tx++) {
          if (tiles[top][tx] === '?') {
            tiles[top][tx] = '#';
            score += 10;
            particles.push({ x: tx * TILE + 16, y: top * TILE, vy: -4, life: 20, type: 'coin' });
            sfxCoin();
          } else if (tiles[top][tx] === '#') {
            sfxBump();
          }
        }
        ent.y = (top + 1) * TILE;
        ent.vy = 0;
      } else ent.y = nextY;
    }
  } else {
    // 检查是否站在地面上
    let bottom = Math.floor((ent.y + ent.h) / TILE);
    let left = Math.floor(ent.x / TILE);
    let right = Math.floor((ent.x + ent.w - 1) / TILE);
    let standing = false;
    for (let tx = left; tx <= right; tx++) if (isTileSolid(tx, bottom)) { standing = true; break; }
    ent.onGround = standing;
  }
  if (ent.x < 0) ent.x = 0;
  if (ent.x + ent.w > mapW * TILE) ent.x = mapW * TILE - ent.w;
  if (ent.y > mapH * TILE + 100) {
    if (ent === mario && !dead) { die(); }
  }
}

function die() {
  if (dead) return;
  dead = true; deadTimer = 60; mario.vy = -8; sfxDie();
  lives--;
}

function resetPos() {
  mario.x = startPos.x; mario.y = startPos.y; mario.vx = 0; mario.vy = 0; dead = false; deadTimer = 0;
}

function update() {
  if (won) {
    if ((keys['KeyR'])) { initLevel(); }
    return;
  }
  if (dead) {
    deadTimer--;
    mario.vy += GRAVITY * 0.5;
    mario.y += mario.vy;
    if (deadTimer <= 0) {
      if (lives <= 0) { initLevel(); }
      else resetPos();
    }
    return;
  }

  // 输入
  if (keys['ArrowLeft'] || keys['KeyA']) { mario.vx -= 0.6; mario.dir = -1; }
  if (keys['ArrowRight'] || keys['KeyD']) { mario.vx += 0.6; mario.dir = 1; }
  if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && mario.onGround) {
    mario.vy = JUMP; mario.onGround = false; sfxJump();
  }
  if (keys['KeyR']) { initLevel(); }

  // 物理
  mario.vx *= FRICTION;
  mario.vy += GRAVITY;
  if (mario.vx > SPEED) mario.vx = SPEED;
  if (mario.vx < -SPEED) mario.vx = -SPEED;
  resolveEntity(mario);

  // 金币收集
  for (let c of coins) {
    if (!c.alive) continue;
    if (rectRect(mario.x, mario.y, mario.w, mario.h, c.x - c.r, c.y - c.r, c.r * 2, c.r * 2)) {
      c.alive = false; score += 100; sfxCoin();
    }
  }

  // 敌人
  for (let e of enemies) {
    if (!e.alive) continue;
    e.anim += 0.15;
    let nextX = e.x + e.vx;
    let left = Math.floor(nextX / TILE);
    let right = Math.floor((nextX + e.w - 1) / TILE);
    let ty = Math.floor((e.y + e.h) / TILE);
    let turn = false;
    if (e.vx > 0) {
      if (isTileSolid(right, Math.floor(e.y / TILE)) || isTileSolid(right, Math.floor((e.y + e.h - 1) / TILE))) turn = true;
      else if (!isTileSolid(right, ty) && tiles[ty][right] !== 'K') turn = true;
    } else {
      if (isTileSolid(left, Math.floor(e.y / TILE)) || isTileSolid(left, Math.floor((e.y + e.h - 1) / TILE))) turn = true;
      else if (!isTileSolid(left, ty) && tiles[ty][left] !== 'K') turn = true;
    }
    if (turn) e.vx = -e.vx; else e.x = nextX;

    // 与马里奥碰撞
    if (rectRect(mario.x, mario.y, mario.w, mario.h, e.x, e.y, e.w, e.h)) {
      if (mario.vy > 0 && mario.y + mario.h < e.y + e.h * 0.6) {
        e.alive = false; mario.vy = -6; score += 200; sfxStomp();
        particles.push({ x: e.x + e.w/2, y: e.y + e.h/2, vy: -3, life: 15, type: 'star' });
      } else {
        die(); return;
      }
    }
  }

  // 旗杆检测
  if (flagX >= 0) {
    if (mario.x + mario.w > flagX && mario.x < flagX + 8 && mario.y + mario.h > flagY - 5 * TILE) {
      won = true; score += 1000; sfxWin();
    }
  }

  // 粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.y += p.vy; p.vy += 0.2; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // 相机
  cameraX = mario.x + mario.w / 2 - canvas.width / 2;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > mapW * TILE - canvas.width) cameraX = mapW * TILE - canvas.width;
  cameraY = mario.y + mario.h / 2 - canvas.height / 2;
  if (cameraY < 0) cameraY = 0;
  if (cameraY > mapH * TILE - canvas.height) cameraY = mapH * TILE - canvas.height;

  // 计时器
  timeTick++;
  if (timeTick % 40 === 0 && time > 0) time--;
}

// ===================== 绘制 =====================
function drawSky() {
  // 天空背景
  ctx.fillStyle = '#5c94fc';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // 云朵
  ctx.fillStyle = '#ffffff';
  const clouds = [[120,80,60], [400,60,80], [700,90,50], [900,50,70]];
  for (let [cx, cy, cs] of clouds) {
    let px = ((cx - cameraX * 0.3) % (canvas.width + 200)) - 100;
    if (px < -200) px += canvas.width + 200;
    let py = cy - cameraY * 0.15;
    if (py < -60) py += (canvas.height + 120);
    ctx.beginPath(); ctx.arc(px, py, cs * 0.5, 0, Math.PI * 2);
    ctx.arc(px + cs * 0.4, py - cs * 0.2, cs * 0.4, 0, Math.PI * 2);
    ctx.arc(px + cs * 0.7, py, cs * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTile(c, x, y) {
  const px = x - cameraX;
  const py = y - cameraY;
  if (px < -TILE || px > canvas.width || py < -TILE || py > canvas.height) return;
  switch (c) {
    case '#': {
      ctx.fillStyle = '#b85c00';
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = '#e68a00';
      ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
      ctx.fillStyle = '#b85c00';
      ctx.fillRect(px + 4, py + 4, TILE - 8, 3);
      ctx.fillRect(px + 4, py + 10, TILE - 8, 3);
      ctx.fillRect(px + 4, py + 16, TILE - 8, 3);
      ctx.fillRect(px + 4, py + 22, TILE - 8, 3);
      break;
    }
    case '?': {
      ctx.fillStyle = '#f8b800';
      ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
      ctx.fillStyle = '#d48000';
      ctx.fillRect(px, py, TILE, 2); ctx.fillRect(px, py + TILE - 2, TILE, 2);
      ctx.fillRect(px, py, 2, TILE); ctx.fillRect(px + TILE - 2, py, 2, TILE);
      ctx.fillStyle = '#b03000';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', px + TILE / 2, py + 24);
      break;
    }
    case 'P': {
      ctx.fillStyle = '#00aa00';
      ctx.fillRect(px + 4, py, TILE - 8, TILE);
      ctx.fillStyle = '#00cc00';
      ctx.fillRect(px + 6, py + 2, TILE - 12, TILE - 4);
      ctx.fillStyle = '#006600';
      ctx.fillRect(px + 4, py + TILE - 4, TILE - 8, 4);
      break;
    }
    case 'p': {
      ctx.fillStyle = '#00aa00';
      ctx.fillRect(px + 4, py, TILE - 8, TILE);
      ctx.fillStyle = '#00cc00';
      ctx.fillRect(px + 6, py, TILE - 12, TILE);
      ctx.fillStyle = '#006600';
      ctx.fillRect(px + 4, py + TILE - 2, TILE - 8, 2);
      break;
    }
    case '-': {
      ctx.fillStyle = '#c84c0c';
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = '#fc9c54';
      ctx.fillRect(px, py, TILE, 4);
      ctx.fillStyle = '#803000';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(px + i * 8, py + 4, 1, TILE - 4);
        ctx.fillRect(px, py + 4 + i * 7, TILE, 1);
      }
      break;
    }
    case 'K': {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(px, py + 12, TILE, TILE - 12);
      ctx.fillStyle = '#000';
      ctx.fillRect(px, py + 24, TILE, 2);
      break;
    }
    case '|': {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px + 12, py, 4, TILE);
      break;
    }
  }
}

function drawMario() {
  let mx = mario.x - cameraX;
  let my = mario.y - cameraY;
  if (my < -40 || my > canvas.height) return;
  // 帽子
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(mx + 4, my, 18, 6);
  ctx.fillRect(mx + 2, my + 4, 22, 4);
  // 脸
  ctx.fillStyle = '#ffcc99';
  ctx.fillRect(mx + 6, my + 8, 14, 10);
  // 眼睛
  ctx.fillStyle = '#000';
  ctx.fillRect(mario.dir > 0 ? mx + 16 : mx + 8, my + 10, 3, 4);
  // 胡子
  ctx.fillStyle = '#5c2e08';
  ctx.fillRect(mx + 8, my + 14, 12, 3);
  // 身体
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(mx + 4, my + 18, 18, 8);
  // 背带裤
  ctx.fillStyle = '#0000cc';
  ctx.fillRect(mx + 4, my + 24, 18, 6);
  ctx.fillRect(mx + 6, my + 30, 6, 4);
  ctx.fillRect(mx + 14, my + 30, 6, 4);
  // 纽扣
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(mx + 10, my + 24, 2, 3);
  ctx.fillRect(mx + 16, my + 24, 2, 3);
}

function drawEnemy(e) {
  let ex = e.x - cameraX;
  let ey = e.y - cameraY;
  if (ex < -40 || ex > canvas.width || ey < -40 || ey > canvas.height) return;
  // 身体
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(ex + 2, ey + 6, 24, 18);
  ctx.beginPath(); ctx.ellipse(ex + 14, ey + 24, 12, 6, 0, 0, Math.PI * 2); ctx.fill();
  // 眉毛
  ctx.fillStyle = '#000';
  ctx.fillRect(ex + 4, ey + 8, 8, 3);
  ctx.fillRect(ex + 16, ey + 8, 8, 3);
  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.fillRect(ex + 6, ey + 12, 5, 6);
  ctx.fillRect(ex + 17, ey + 12, 5, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(ex + 7, ey + 14, 3, 3);
  ctx.fillRect(ex + 18, ey + 14, 3, 3);
  // 走路动画
  let wobble = Math.sin(e.anim * 2) * 3;
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(ex + 4 + wobble, ey + 26, 8, 4);
  ctx.fillRect(ex + 16 - wobble, ey + 26, 8, 4);
}

function drawCoin(c) {
  if (!c.alive) return;
  let cx = c.x - cameraX;
  let cy = c.y - cameraY;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(cx, cy, c.r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffea00';
  ctx.beginPath(); ctx.arc(cx - 2, cy - 2, c.r * 0.6, 0, Math.PI * 2); ctx.fill();
}

function drawParticles() {
  for (let p of particles) {
    let px = p.x - cameraX;
    let py = p.y - cameraY;
    if (p.type === 'coin') {
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#ffea00';
      ctx.fillRect(px - 3, py - 3, 6, 6);
    }
  }
}

function drawFlag() {
  if (flagX < 0) return;
  let fx = flagX - cameraX;
  let fy = flagY - cameraY;
  // 旗杆
  ctx.fillStyle = '#ccc';
  ctx.fillRect(fx + 12, fy - 5 * TILE, 4, 6 * TILE);
  // 球
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(fx + 14, fy - 5 * TILE, 6, 0, Math.PI * 2); ctx.fill();
  // 旗帜
  ctx.fillStyle = '#00cc00';
  ctx.beginPath();
  ctx.moveTo(fx + 16, fy - 4 * TILE + 6);
  ctx.lineTo(fx + 48, fy - 4 * TILE + 18);
  ctx.lineTo(fx + 16, fy - 4 * TILE + 30);
  ctx.fill();
}

function drawUI() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(8, 8, 200, 28);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`MARIO ×${lives}   分数 ${score}   时间 ${time}`, 16, 28);

  if (won) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = 'bold 42px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 恭喜过关！', canvas.width / 2, canvas.height / 2 - 20);
    ctx.font = '20px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('按 R 重玩', canvas.width / 2, canvas.height / 2 + 20);
  } else if (dead && lives <= 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f00';
    ctx.font = 'bold 42px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
  }
}

function draw() {
  drawSky();

  let startCol = Math.floor(cameraX / TILE);
  let endCol = Math.floor((cameraX + canvas.width) / TILE) + 1;
  for (let y = 0; y < mapH; y++) {
    for (let x = startCol; x <= endCol && x < mapW; x++) {
      if (tiles[y][x] !== '.') drawTile(tiles[y][x], x * TILE, y * TILE);
    }
  }

  drawFlag();
  for (let c of coins) drawCoin(c);
  if (!dead || deadTimer > 30) drawMario();
  for (let e of enemies) if (e.alive) drawEnemy(e);
  drawParticles();
  drawUI();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initLevel();
loop();
</script>
</body>
</html>
